<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>PokerNow GPT Bot</title>
    <style>
      body {
        width: 280px;
        padding: 16px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #1a1a2e;
        color: #e0e0e0;
        margin: 0;
      }
      h2 {
        margin: 0 0 12px 0;
        font-size: 16px;
        color: #fff;
      }
      .field {
        margin-bottom: 12px;
      }
      label {
        display: block;
        font-size: 12px;
        color: #aaa;
        margin-bottom: 4px;
      }
      input[type="text"] {
        width: 100%;
        padding: 8px;
        border: 1px solid #333;
        border-radius: 4px;
        background: #16213e;
        color: #fff;
        font-size: 13px;
        box-sizing: border-box;
      }
      input[type="text"]:focus {
        outline: none;
        border-color: #4caf50;
      }
      .btn {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 4px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        margin-bottom: 8px;
      }
      .btn-start {
        background: #4caf50;
        color: #fff;
      }
      .btn-start:hover {
        background: #45a049;
      }
      .btn-stop {
        background: #f44336;
        color: #fff;
      }
      .btn-stop:hover {
        background: #da190b;
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .status {
        margin-top: 12px;
        padding: 8px;
        background: #16213e;
        border-radius: 4px;
        font-size: 11px;
        color: #aaa;
      }
      .status .label {
        color: #666;
        font-size: 10px;
      }
      .status .value {
        color: #e0e0e0;
      }
      .status-row {
        margin-bottom: 4px;
      }
      .connected {
        color: #4caf50;
      }
      .disconnected {
        color: #f44336;
      }
      .note {
        font-size: 10px;
        color: #666;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <h2>🤖 PokerNow GPT</h2>

    <div class="field">
      <label for="botName">Your Player Name</label>
      <input
        type="text"
        id="botName"
        placeholder="Enter your name at the table"
      />
    </div>

    <button class="btn btn-start" id="startBtn">Start Bot</button>
    <button class="btn btn-stop" id="stopBtn" style="display: none">
      Stop Bot
    </button>

    <div class="status" id="statusPanel">
      <div class="status-row">
        <span class="label">Status:</span>
        <span class="value" id="statusText">Not running</span>
      </div>
      <div class="status-row">
        <span class="label">Game:</span>
        <span class="value" id="gameInfo">—</span>
      </div>
      <div class="status-row">
        <span class="label">Backend:</span>
        <span class="value" id="backendStatus">Checking...</span>
      </div>
    </div>

    <div class="note">
      Make sure the backend server is running:<br />
      <code>npx tsx app/index.ts</code>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
